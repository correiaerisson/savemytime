<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burn After Reading File Share</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
        .result-container { margin-top: 30px; display: none; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        #qrcode { margin: 20px auto; width: 128px; }
        a.link { color: #007bff; word-break: break-all; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Secure One-Time File Upload</h2>
    <p>Upload a Text, Image, or Audio file (Max 50MB).</p>

    <input type="file" id="fileInput" accept="image/*, audio/*, text/*, application/pdf">
    <button onclick="uploadFile()">Upload File</button>
    <div id="errorMsg" class="error"></div>

    <div class="result-container" id="resultContainer">
        <h3>Success! Here is your one-time link:</h3>
        <p><a id="fileLink" class="link" href="#" target="_blank"></a></p>
        <p><strong>Warning:</strong> This link will permanently expire after it is clicked once.</p>
        <div id="qrcode"></div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const errorMsg = document.getElementById('errorMsg');
            const resultContainer = document.getElementById('resultContainer');
            const fileLink = document.getElementById('fileLink');
            const qrcodeDiv = document.getElementById('qrcode');

            // Reset UI
            errorMsg.innerText = '';
            resultContainer.style.display = 'none';
            qrcodeDiv.innerHTML = ''; 

            if (fileInput.files.length === 0) {
                return errorMsg.innerText = "Please select a file.";
            }

            const file = fileInput.files[0];

            // Client-side validation: 50MB
            if (file.size > 50 * 1024 * 1024) {
                return errorMsg.innerText = "File exceeds the 50MB limit.";
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // Show link
                    fileLink.href = data.url;
                    fileLink.innerText = data.url;
                    resultContainer.style.display = 'block';

                    // Generate QR Code
                    new QRCode(qrcodeDiv, {
                        text: data.url,
                        width: 128,
                        height: 128
                    });
                } else {
                    errorMsg.innerText = data.error || "Upload failed.";
                }
            } catch (err) {
                errorMsg.innerText = "Network error occurred.";
            }
        }
    </script>
</body>
</html>
